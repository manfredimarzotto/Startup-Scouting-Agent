name: Daily scout run

on:
  schedule:
    # 07:00 UTC every weekday — lands in inbox before London morning.
    - cron: "0 7 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e .

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SCOUT_LOOKBACK_DAYS: "2"
        run: scout run

      - name: Commit digest
        run: |
          git config user.name "scout-bot"
          git config user.email "scout-bot@users.noreply.github.com"
          git add digests/*.md scout.db || true
          git diff --cached --quiet || git commit -m "digest: $(date -u +%Y-%m-%d)"
          git push
