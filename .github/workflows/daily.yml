name: Daily scout run

on:
  schedule:
    # 07:00 UTC every weekday — lands in inbox before London morning.
    - cron: "0 7 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e .

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # 7-day sliding window so a Saturday cron still has weekday volume
          # to chew through. Idempotency via scout.db means already-scored
          # events get skipped on subsequent runs.
          SCOUT_LOOKBACK_DAYS: "7"
        run: scout run

      - name: Regenerate dashboard
        run: scout dashboard

      - name: Commit digest + dashboard
        run: |
          git config user.name "scout-bot"
          git config user.email "scout-bot@users.noreply.github.com"
          # -f to bypass .gitignore — digests and scout.db are ignored locally
          # so day-to-day experiments don't pollute the repo, but CI commits
          # them so digests are durable and scout.db carries idempotency state
          # forward to the next run.
          git add -f digests/*.md scout.db docs/index.html 2>/dev/null || true
          git diff --cached --quiet || git commit -m "digest: $(date -u +%Y-%m-%d)"
          git push
